name: Update Data

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Prepare data branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf public/data
          data_remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$data_remote" data >/dev/null 2>&1; then
            git clone --depth 1 --branch data "$data_remote" public/data
          else
            rm -rf public/data
            mkdir -p public/data
            git -C public/data init
            git -C public/data checkout --orphan data
            git -C public/data remote add origin "$data_remote"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          DATA_DIR: public/data
        run: npm run data:update

      - name: Verify generated data
        env:
          DATA_DIR: public/data
        run: npm run verify:data

      - name: Commit data branch
        run: |
          git -C public/data config user.name "github-actions[bot]"
          git -C public/data config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C public/data add manifest.json repos snapshots
          if git -C public/data diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git -C public/data commit -m "chore: update StarVista data"
            git -C public/data push origin HEAD:data
          fi
